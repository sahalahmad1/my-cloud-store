<!DOCTYPE html>
<html>
<head>
    <title>Sahal's Cloud Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/dist/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">☁️ Sahal's Cloud Store</a>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="mb-4">Our Cloud Infrastructure Products</h2>
        <div class="row">
            {% for product in products %}
            <div class="col-md-4 mb-4">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">{{ product.name }}</h5>
                        <p class="card-text text-muted">{{ product.description }}</p>
                        <h4 class="text-primary">{{ product.price }}</h4>
                        <button class="btn btn-success w-100">Add to Cart</button>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
